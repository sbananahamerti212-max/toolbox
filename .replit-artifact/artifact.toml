kind = "mobile"
previewPath = "/"
title = "ToolBox APK"
version = "1.0.0"
id = "artifacts/toolbox"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23053

[services.development]
run = "pnpm --filter @workspace/toolbox run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/toolbox", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/toolbox", "run", "serve" ]

[services.env]
PORT = "23053"
BASE_PATH = "/"
